name: Build → Trivy Scan → Push to DockerHub

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag"
        required: false
        default: "secure-latest"
      max_iterations:
        description: "Max retry iterations"
        required: false
        default: "5"
  push:
    branches:
      - main
    paths:
      - "web/Dockerfile"
      - "worker/Dockerfile"
      - "worker/src/**"
      - "packages/**"

concurrency:
  group: build-scan-push-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_TAG: ${{ github.event.inputs.image_tag || 'secure-latest' }}
  MAX_ITER: ${{ github.event.inputs.max_iterations || '5' }}
  WEB_IMAGE: olegkarenkikh/langfuse-web
  WORKER_IMAGE: olegkarenkikh/langfuse-worker
  DOCKERHUB_USER: olegkarenkikh

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      security-events: write

    steps:
      # ─────────────────────────────────────────────
      # 1. Checkout
      # ─────────────────────────────────────────────
      - name: Checkout olegkarenkikh/langfuse
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # ─────────────────────────────────────────────
      # 2. Подготовка Docker Buildx
      # ─────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─────────────────────────────────────────────
      # 3. Авторизация в DockerHub
      # ─────────────────────────────────────────────
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ─────────────────────────────────────────────
      # 4. Установка Trivy
      # ─────────────────────────────────────────────
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin
          trivy --version

      # ─────────────────────────────────────────────
      # 5. Обновление БД Trivy
      # ─────────────────────────────────────────────
      - name: Update Trivy DB
        run: trivy image --download-db-only --quiet

      # ─────────────────────────────────────────────
      # 6. Установить NEXT_PUBLIC_BUILD_ID
      # ─────────────────────────────────────────────
      - name: Set NEXT_PUBLIC_BUILD_ID
        run: echo "NEXT_PUBLIC_BUILD_ID=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # ═══════════════════════════════════════════════
      # ЦИКЛ: WEB IMAGE
      # ═══════════════════════════════════════════════
      - name: "🔁 BUILD+SCAN LOOP — langfuse-web"
        id: web_loop
        run: |
          set -euo pipefail
          MAX=${{ env.MAX_ITER }}
          TAG="${{ env.IMAGE_TAG }}"
          IMAGE="${{ env.WEB_IMAGE }}:${TAG}"
          
          for i in $(seq 1 $MAX); do
            echo ""
            echo "══════════════════════════════════════════"
            echo "  WEB — Итерация $i / $MAX"
            echo "══════════════════════════════════════════"
            
            # Собираем образ
            echo "🔨 Сборка $IMAGE ..."
            if DOCKER_BUILDKIT=1 docker build \
                --no-cache \
                --pull \
                --build-arg NEXT_PUBLIC_BUILD_ID="${NEXT_PUBLIC_BUILD_ID}" \
                --label "build.iteration=${i}" \
                --label "build.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                --label "build.sha=${{ github.sha }}" \
                -f ./web/Dockerfile \
                -t "$IMAGE" \
                .; then
              echo "✅ Сборка успешна"
            else
              echo "❌ Ошибка сборки на итерации $i"
              if [ $i -lt $MAX ]; then
                echo "Повтор через 30 сек..."
                sleep 30
                continue
              else
                echo "Исчерпан лимит итераций" && exit 1
              fi
            fi
            
            # Trivy сканирование
            echo "🔍 Trivy сканирование $IMAGE ..."
            REPORT="/tmp/trivy-web-${i}.json"
            trivy image \
              --format json \
              --output "$REPORT" \
              --severity CRITICAL,HIGH \
              --exit-code 0 \
              --no-progress \
              "$IMAGE"
            
            VULN_COUNT=$(python3 -c "
          import json, sys
          data = json.load(open('$REPORT'))
          total = sum(len(r.get('Vulnerabilities') or []) for r in data.get('Results', []))
          print(total)
          ")
            
            echo "Найдено уязвимостей CRITICAL/HIGH: $VULN_COUNT"
            
            if [ "$VULN_COUNT" -eq 0 ]; then
              echo "✅ Trivy PASSED — 0 CRITICAL/HIGH уязвимостей"
              echo "web_passed=true" >> $GITHUB_OUTPUT
              echo "web_image=$IMAGE" >> $GITHUB_OUTPUT
              break
            else
              echo "❌ Trivy FAILED — $VULN_COUNT уязвимостей"
              python3 -c "
          import json
          data = json.load(open('$REPORT'))
          vulns = [v for r in data.get('Results',[]) for v in (r.get('Vulnerabilities') or [])]
          for v in sorted(vulns, key=lambda x: x.get('Severity',''))[:20]:
              print(f\"  {v.get('Severity','?'):8} | {v.get('VulnerabilityID','?'):20} | {v.get('PkgName','?')} {v.get('InstalledVersion','?')} → {v.get('FixedVersion','нет фикса')}\")
          "
              if [ $i -lt $MAX ]; then
                echo "Повтор через 30 сек..."
                sleep 30
              else
                echo "Исчерпан лимит итераций" && exit 1
              fi
            fi
          done

      # ─────────────────────────────────────────────
      # 7. Загрузка Trivy отчёта web как артефакт
      # ─────────────────────────────────────────────
      - name: Upload Trivy Web Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report-web
          path: /tmp/trivy-web-*.json

      # ─────────────────────────────────────────────
      # 8. Push web image
      # ─────────────────────────────────────────────
      - name: Push langfuse-web to DockerHub
        if: steps.web_loop.outputs.web_passed == 'true'
        run: |
          docker push "${{ env.WEB_IMAGE }}:${{ env.IMAGE_TAG }}"
          echo "✅ Pushed: ${{ env.WEB_IMAGE }}:${{ env.IMAGE_TAG }}"
          # Также тегируем как latest
          docker tag "${{ env.WEB_IMAGE }}:${{ env.IMAGE_TAG }}" "${{ env.WEB_IMAGE }}:latest"
          docker push "${{ env.WEB_IMAGE }}:latest"
          echo "✅ Pushed: ${{ env.WEB_IMAGE }}:latest"

      # ═══════════════════════════════════════════════
      # ЦИКЛ: WORKER IMAGE
      # ═══════════════════════════════════════════════
      - name: "🔁 BUILD+SCAN LOOP — langfuse-worker"
        id: worker_loop
        run: |
          set -euo pipefail
          MAX=${{ env.MAX_ITER }}
          TAG="${{ env.IMAGE_TAG }}"
          IMAGE="${{ env.WORKER_IMAGE }}:${TAG}"
          
          for i in $(seq 1 $MAX); do
            echo ""
            echo "══════════════════════════════════════════"
            echo "  WORKER — Итерация $i / $MAX"
            echo "══════════════════════════════════════════"
            
            echo "🔨 Сборка $IMAGE ..."
            if DOCKER_BUILDKIT=1 docker build \
                --no-cache \
                --pull \
                --build-arg NEXT_PUBLIC_BUILD_ID="${NEXT_PUBLIC_BUILD_ID}" \
                --label "build.iteration=${i}" \
                --label "build.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                --label "build.sha=${{ github.sha }}" \
                -f ./worker/Dockerfile \
                -t "$IMAGE" \
                .; then
              echo "✅ Сборка успешна"
            else
              echo "❌ Ошибка сборки на итерации $i"
              if [ $i -lt $MAX ]; then sleep 30; continue
              else echo "Исчерпан лимит итераций" && exit 1; fi
            fi
            
            echo "🔍 Trivy сканирование $IMAGE ..."
            REPORT="/tmp/trivy-worker-${i}.json"
            trivy image \
              --format json \
              --output "$REPORT" \
              --severity CRITICAL,HIGH \
              --exit-code 0 \
              --no-progress \
              "$IMAGE"
            
            VULN_COUNT=$(python3 -c "
          import json, sys
          data = json.load(open('$REPORT'))
          total = sum(len(r.get('Vulnerabilities') or []) for r in data.get('Results', []))
          print(total)
          ")
            
            echo "Найдено уязвимостей CRITICAL/HIGH: $VULN_COUNT"
            
            if [ "$VULN_COUNT" -eq 0 ]; then
              echo "✅ Trivy PASSED — 0 CRITICAL/HIGH уязвимостей"
              echo "worker_passed=true" >> $GITHUB_OUTPUT
              echo "worker_image=$IMAGE" >> $GITHUB_OUTPUT
              break
            else
              echo "❌ Trivy FAILED — $VULN_COUNT уязвимостей"
              python3 -c "
          import json
          data = json.load(open('$REPORT'))
          vulns = [v for r in data.get('Results',[]) for v in (r.get('Vulnerabilities') or [])]
          for v in sorted(vulns, key=lambda x: x.get('Severity',''))[:20]:
              print(f\"  {v.get('Severity','?'):8} | {v.get('VulnerabilityID','?'):20} | {v.get('PkgName','?')} {v.get('InstalledVersion','?')} → {v.get('FixedVersion','нет фикса')}\")
          "
              if [ $i -lt $MAX ]; then sleep 30
              else echo "Исчерпан лимит итераций" && exit 1; fi
            fi
          done

      # ─────────────────────────────────────────────
      # 9. Загрузка Trivy отчёта worker как артефакт
      # ─────────────────────────────────────────────
      - name: Upload Trivy Worker Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report-worker
          path: /tmp/trivy-worker-*.json

      # ─────────────────────────────────────────────
      # 10. Push worker image
      # ─────────────────────────────────────────────
      - name: Push langfuse-worker to DockerHub
        if: steps.worker_loop.outputs.worker_passed == 'true'
        run: |
          docker push "${{ env.WORKER_IMAGE }}:${{ env.IMAGE_TAG }}"
          echo "✅ Pushed: ${{ env.WORKER_IMAGE }}:${{ env.IMAGE_TAG }}"
          docker tag "${{ env.WORKER_IMAGE }}:${{ env.IMAGE_TAG }}" "${{ env.WORKER_IMAGE }}:latest"
          docker push "${{ env.WORKER_IMAGE }}:latest"
          echo "✅ Pushed: ${{ env.WORKER_IMAGE }}:latest"

      # ─────────────────────────────────────────────
      # 11. Итоговый статус
      # ─────────────────────────────────────────────
      - name: "✅ Финальный отчёт"
        if: always()
        run: |
          echo ""
          echo "╔═══════════════════════════════════════════════════════╗"
          echo "║              ИТОГОВЫЙ СТАТУС СБОРКИ                  ║"
          echo "╠═══════════════════════════════════════════════════════╣"
          if [ "${{ steps.web_loop.outputs.web_passed }}" = "true" ]; then
            echo "║  WEB:    ✅ Собран, прошёл Trivy, запушен             ║"
            echo "║          ${{ env.WEB_IMAGE }}:${{ env.IMAGE_TAG }}"
          else
            echo "║  WEB:    ❌ Не прошёл (см. артефакт trivy-report-web) ║"
          fi
          if [ "${{ steps.worker_loop.outputs.worker_passed }}" = "true" ]; then
            echo "║  WORKER: ✅ Собран, прошёл Trivy, запушен             ║"
            echo "║          ${{ env.WORKER_IMAGE }}:${{ env.IMAGE_TAG }}"
          else
            echo "║  WORKER: ❌ Не прошёл (см. артефакт trivy-report-worker)║"
          fi
          echo "╚═══════════════════════════════════════════════════════╝"

